<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Remove Extra Spaces</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="/assets/css/styles.css" rel="stylesheet">
</head>
<body>
<div id="header"></div>
<main class="container my-4">
  <h1 class="h3 mb-3">Remove Extra Spaces / Line Breaks</h1>
  <div class="ad-slot mb-3"><div class="ad-placeholder">Ad</div></div>
  <div class="tool-container">
    <div class="row g-3">
      <div class="col-12 col-lg-8">
        <textarea id="input" class="form-control" rows="10" placeholder="Paste text here..."></textarea>
      </div>
      <div class="col-12 col-lg-4">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="trimLines" checked>
          <label class="form-check-label" for="trimLines">Trim each line</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="collapseSpaces" checked>
          <label class="form-check-label" for="collapseSpaces">Collapse multiple spaces</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="removeEmpty" checked>
          <label class="form-check-label" for="removeEmpty">Remove empty lines</label>
        </div>
        <div class="mt-3 d-grid gap-2">
          <button id="processBtn" class="btn btn-primary">Clean Text</button>
          <button id="copyBtn" class="btn btn-outline-secondary">Copy Output</button>
        </div>
      </div>
    </div>
    <div class="mt-3">
      <label class="form-label">Output</label>
      <textarea id="output" class="form-control" rows="8" readonly></textarea>
    </div>
  </div>
</main>
<div id="footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/assets/js/main.js"></script>
<script>
const input = document.getElementById('input');
const output = document.getElementById('output');
const trimLines = document.getElementById('trimLines');
const collapseSpaces = document.getElementById('collapseSpaces');
const removeEmpty = document.getElementById('removeEmpty');

function process() {
  let text = input.value || '';
  let lines = text.split(/\r?\n/);
  if (trimLines.checked) lines = lines.map(l => l.trim());
  if (collapseSpaces.checked) lines = lines.map(l => l.replace(/\s{2,}/g, ' '));
  if (removeEmpty.checked) lines = lines.filter(l => l.length > 0);
  output.value = lines.join('\n');
}

document.getElementById('processBtn').addEventListener('click', process);

document.getElementById('copyBtn').addEventListener('click', async () => {
  output.select(); document.execCommand('copy');
});
</script>
</body>
</html>
