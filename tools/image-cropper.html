<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Image Cropper</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="/assets/css/styles.css" rel="stylesheet">
</head>
<body>
<div id="header"></div>
<main class="container my-4">
  <h1 class="h3 mb-3">Image Cropper</h1>
  <div class="ad-slot mb-3"><div class="ad-placeholder">Ad</div></div>
  <div class="tool-container">
    <div class="row g-3 align-items-end">
      <div class="col-12 col-md-4">
        <label class="form-label">Choose Image</label>
        <input id="fileInput" class="form-control" type="file" accept="image/*">
      </div>
      <div class="col-6 col-md-2">
        <label class="form-label">X</label>
        <input id="x" class="form-control" type="number" value="0" min="0">
      </div>
      <div class="col-6 col-md-2">
        <label class="form-label">Y</label>
        <input id="y" class="form-control" type="number" value="0" min="0">
      </div>
      <div class="col-6 col-md-2">
        <label class="form-label">Width</label>
        <input id="w" class="form-control" type="number" value="100" min="1">
      </div>
      <div class="col-6 col-md-2">
        <label class="form-label">Height</label>
        <input id="h" class="form-control" type="number" value="100" min="1">
      </div>
    </div>
    <canvas id="srcCanvas" class="w-100 d-none mt-3" style="max-height:60vh; border:1px dashed #ced4da;"></canvas>
    <div class="mt-3">
      <button id="cropBtn" class="btn btn-primary" disabled>Crop</button>
    </div>
    <canvas id="outCanvas" class="w-100 d-none mt-3" style="max-height:60vh;"></canvas>
    <div id="actions" class="mt-3 d-none">
      <a id="downloadBtn" class="btn btn-success" download="cropped.png">Download</a>
    </div>
  </div>
</main>
<div id="footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/assets/js/main.js"></script>
<script>
let img = null;
const fileInput = document.getElementById('fileInput');
const srcCanvas = document.getElementById('srcCanvas');
const sctx = srcCanvas.getContext('2d');
const outCanvas = document.getElementById('outCanvas');
const octx = outCanvas.getContext('2d');
const x = document.getElementById('x');
const y = document.getElementById('y');
const w = document.getElementById('w');
const h = document.getElementById('h');
const cropBtn = document.getElementById('cropBtn');
const downloadBtn = document.getElementById('downloadBtn');

fileInput.addEventListener('change', e => {
  const file = e.target.files[0]; if (!file) return;
  const url = URL.createObjectURL(file);
  const image = new Image();
  image.onload = () => {
    img = image;
    srcCanvas.width = img.width; srcCanvas.height = img.height;
    sctx.drawImage(img, 0, 0);
    srcCanvas.classList.remove('d-none');
    cropBtn.disabled = false;
    x.value = 0; y.value = 0; w.value = Math.min(300, img.width); h.value = Math.min(300, img.height);
    URL.revokeObjectURL(url);
  };
  image.src = url;
});

cropBtn.addEventListener('click', () => {
  if (!img) return;
  const cx = Math.max(0, Math.min(img.width, parseInt(x.value)||0));
  const cy = Math.max(0, Math.min(img.height, parseInt(y.value)||0));
  const cw = Math.max(1, Math.min(img.width - cx, parseInt(w.value)||1));
  const ch = Math.max(1, Math.min(img.height - cy, parseInt(h.value)||1));
  outCanvas.width = cw; outCanvas.height = ch;
  octx.drawImage(img, cx, cy, cw, ch, 0, 0, cw, ch);
  outCanvas.classList.remove('d-none');
  document.getElementById('actions').classList.remove('d-none');
  downloadBtn.href = outCanvas.toDataURL('image/png');
});
</script>
</body>
</html>
