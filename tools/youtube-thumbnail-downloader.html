<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>YouTube Thumbnail Downloader</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="/assets/css/styles.css" rel="stylesheet">
</head>
<body>
<div id="header"></div>
<main class="container my-4">
  <h1 class="h3 mb-3">YouTube Thumbnail Downloader</h1>
  <div class="ad-slot mb-3"><div class="ad-placeholder">Ad</div></div>
  <div class="tool-container">
    <div class="row g-3 align-items-end">
      <div class="col-12 col-md-9">
        <label class="form-label">YouTube URL or ID</label>
        <input id="yt" class="form-control" type="text" placeholder="https://www.youtube.com/watch?v=dQw4w9WgXcQ">
      </div>
      <div class="col-12 col-md-3">
        <button id="fetchBtn" class="btn btn-primary w-100">Fetch Thumbnails</button>
      </div>
    </div>
    <div id="thumbs" class="row g-3 mt-3"></div>
  </div>
</main>
<div id="footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/assets/js/main.js"></script>
<script>
function extractId(input){
  const urlMatch = input.match(/[?&]v=([\w-]{11})/) || input.match(/youtu\.be\/([\w-]{11})/) || input.match(/\/shorts\/([\w-]{11})/);
  if (urlMatch) return urlMatch[1];
  const idMatch = input.match(/^[\w-]{11}$/); if (idMatch) return idMatch[0];
  return null;
}

document.getElementById('fetchBtn').addEventListener('click', () => {
  const inp = document.getElementById('yt').value.trim();
  const id = extractId(inp);
  const sizes = ['maxresdefault','sddefault','hqdefault','mqdefault','default'];
  const container = document.getElementById('thumbs');
  container.innerHTML = '';
  if (!id) { container.innerHTML = '<div class="text-danger">Invalid URL or ID.</div>'; return; }
  sizes.forEach(sz => {
    const url = `https://i.ytimg.com/vi/${id}/${sz}.jpg`;
    const col = document.createElement('div');
    col.className = 'col-12 col-sm-6 col-lg-4';
    col.innerHTML = `<div class="card h-100"><img src="${url}" class="card-img-top" alt="${sz}"><div class="card-body"><div class="d-flex justify-content-between align-items-center"><div class="small text-muted">${sz}.jpg</div><a class="btn btn-sm btn-outline-primary" href="${url}" download>Download</a></div></div></div>`;
    container.appendChild(col);
  });
});
</script>
</body>
</html>
