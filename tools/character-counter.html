<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Character Counter</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="/assets/css/styles.css" rel="stylesheet">
</head>
<body>
<div id="header"></div>
<main class="container my-4">
  <h1 class="h3 mb-3">Character Counter</h1>
  <div class="ad-slot mb-3"><div class="ad-placeholder">Ad</div></div>
  <div class="tool-container">
    <textarea id="input" class="form-control" rows="8" placeholder="Type or paste your text here..."></textarea>
    <div class="row g-3 mt-3 small text-muted">
      <div class="col-6 col-md-3">With spaces: <span id="withSpaces">0</span></div>
      <div class="col-6 col-md-3">Without spaces: <span id="withoutSpaces">0</span></div>
      <div class="col-6 col-md-3">Lines: <span id="lines">0</span></div>
      <div class="col-6 col-md-3">Unique chars: <span id="unique">0</span></div>
    </div>
  </div>
</main>
<div id="footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/assets/js/main.js"></script>
<script>
const input = document.getElementById('input');
const withSpaces = document.getElementById('withSpaces');
const withoutSpaces = document.getElementById('withoutSpaces');
const lines = document.getElementById('lines');
const unique = document.getElementById('unique');

function update() {
  const text = input.value || '';
  withSpaces.textContent = text.length;
  withoutSpaces.textContent = text.replace(/\s/g, '').length;
  lines.textContent = text ? text.split(/\n/).length : 0;
  unique.textContent = new Set([...text]).size;
}
input.addEventListener('input', update);
update();
</script>
</body>
</html>
