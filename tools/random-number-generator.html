<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Random Number Generator</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="/assets/css/styles.css" rel="stylesheet">
</head>
<body>
<div id="header"></div>
<main class="container my-4">
  <h1 class="h3 mb-3">Random Number Generator</h1>
  <div class="ad-slot mb-3"><div class="ad-placeholder">Ad</div></div>
  <div class="tool-container">
    <div class="row g-3 align-items-end">
      <div class="col-6 col-md-2"><label class="form-label">Min</label><input id="min" class="form-control" type="number" value="1"></div>
      <div class="col-6 col-md-2"><label class="form-label">Max</label><input id="max" class="form-control" type="number" value="100"></div>
      <div class="col-6 col-md-2"><label class="form-label">Count</label><input id="count" class="form-control" type="number" value="1" min="1" max="10000"></div>
      <div class="col-6 col-md-2"><div class="form-check mt-4"><input id="unique" class="form-check-input" type="checkbox"><label class="form-check-label" for="unique">Unique</label></div></div>
      <div class="col-6 col-md-2"><div class="form-check mt-4"><input id="sorted" class="form-check-input" type="checkbox"><label class="form-check-label" for="sorted">Sorted</label></div></div>
      <div class="col-6 col-md-2"><button id="genBtn" class="btn btn-primary w-100">Generate</button></div>
    </div>
    <div class="mt-3">
      <textarea id="output" class="form-control" rows="6" readonly></textarea>
    </div>
  </div>
</main>
<div id="footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/assets/js/main.js"></script>
<script>
function randInt(min, max){
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

document.getElementById('genBtn').addEventListener('click', () => {
  const min = parseInt(document.getElementById('min').value);
  const max = parseInt(document.getElementById('max').value);
  const count = Math.min(10000, Math.max(1, parseInt(document.getElementById('count').value)||1));
  const unique = document.getElementById('unique').checked;
  const sorted = document.getElementById('sorted').checked;
  if (isNaN(min) || isNaN(max) || min > max) return;
  let arr = [];
  if (unique) {
    const set = new Set();
    const limit = Math.min(count, max - min + 1);
    while (set.size < limit) set.add(randInt(min, max));
    arr = Array.from(set);
  } else {
    for (let i=0;i<count;i++) arr.push(randInt(min, max));
  }
  if (sorted) arr.sort((a,b)=>a-b);
  document.getElementById('output').value = arr.join(', ');
});
</script>
</body>
</html>
