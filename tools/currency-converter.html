<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Currency Converter</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="/assets/css/styles.css" rel="stylesheet">
</head>
<body>
<div id="header"></div>
<main class="container my-4">
  <h1 class="h3 mb-3">Currency Converter</h1>
  <div class="ad-slot mb-3"><div class="ad-placeholder">Ad</div></div>
  <div class="tool-container">
    <div class="row g-3 align-items-end">
      <div class="col-12 col-md-3">
        <label class="form-label">Amount</label>
        <input id="amount" class="form-control" type="number" step="any" value="1">
      </div>
      <div class="col-6 col-md-3">
        <label class="form-label">From</label>
        <select id="from" class="form-select"></select>
      </div>
      <div class="col-6 col-md-3">
        <label class="form-label">To</label>
        <select id="to" class="form-select"></select>
      </div>
      <div class="col-12 col-md-3">
        <button id="convertBtn" class="btn btn-primary w-100">Convert</button>
        <button id="swapBtn" class="btn btn-outline-secondary w-100 mt-2">Swap</button>
      </div>
    </div>
    <div class="mt-3">
      <div id="result" class="alert alert-info d-none"></div>
      <div id="rateInfo" class="small text-muted"></div>
    </div>
  </div>
</main>
<div id="footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/assets/js/main.js"></script>
<script>
let rates = null; let base = 'USD';
async function loadRates(){
  try{
    const res = await fetch('https://api.exchangerate.host/latest');
    const data = await res.json();
    rates = data.rates; base = data.base || 'EUR';
  }catch(e){
    rates = {USD:1, EUR:0.92, GBP:0.78, INR:83, JPY:160, AUD:1.5, CAD:1.35, CNY:7.2, BRL:5.3}; base='USD';
  }
  const codes = Object.keys(rates).sort();
  const from = document.getElementById('from');
  const to = document.getElementById('to');
  from.innerHTML = codes.map(c=>`<option value="${c}">${c}</option>`).join('');
  to.innerHTML = codes.map(c=>`<option value="${c}">${c}</option>`).join('');
  from.value = 'USD'; to.value='EUR';
}
loadRates();

document.getElementById('convertBtn').addEventListener('click', () => {
  if (!rates) return;
  const amount = parseFloat(document.getElementById('amount').value) || 0;
  const from = document.getElementById('from').value;
  const to = document.getElementById('to').value;
  const inBase = amount / rates[from];
  const out = inBase * rates[to];
  const resEl = document.getElementById('result');
  resEl.textContent = `${amount} ${from} = ${out.toFixed(4)} ${to}`;
  resEl.classList.remove('d-none');
  document.getElementById('rateInfo').textContent = `1 ${from} = ${(rates[to]/rates[from]).toFixed(6)} ${to}`;
});

document.getElementById('swapBtn').addEventListener('click', () => {
  const from = document.getElementById('from');
  const to = document.getElementById('to');
  const tmp = from.value; from.value = to.value; to.value = tmp;
});
</script>
</body>
</html>
