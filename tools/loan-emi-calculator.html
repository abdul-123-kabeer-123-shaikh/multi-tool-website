<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Loan EMI Calculator</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="/assets/css/styles.css" rel="stylesheet">
</head>
<body>
<div id="header"></div>
<main class="container my-4">
  <h1 class="h3 mb-3">Loan EMI Calculator</h1>
  <div class="ad-slot mb-3"><div class="ad-placeholder">Ad</div></div>
  <div class="tool-container">
    <div class="row g-3 align-items-end">
      <div class="col-12 col-md-3">
        <label class="form-label">Loan Amount</label>
        <input id="principal" class="form-control" type="number" step="any" min="0">
      </div>
      <div class="col-12 col-md-3">
        <label class="form-label">Annual Interest (%)</label>
        <input id="rate" class="form-control" type="number" step="any" min="0">
      </div>
      <div class="col-12 col-md-3">
        <label class="form-label">Term (months)</label>
        <input id="months" class="form-control" type="number" min="1">
      </div>
      <div class="col-12 col-md-3">
        <button id="calcBtn" class="btn btn-primary w-100">Calculate</button>
      </div>
    </div>
    <div class="mt-3" id="summary" class="d-none"></div>
    <div class="mt-3">
      <button id="toggleSchedule" class="btn btn-outline-secondary btn-sm d-none">Toggle Schedule</button>
      <div id="schedule" class="table-responsive d-none mt-2"></div>
    </div>
  </div>
</main>
<div id="footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/assets/js/main.js"></script>
<script>
function calcEmi(P, annualRate, n){
  const r = annualRate/12/100;
  if (r===0) return P/n;
  return P * r * Math.pow(1+r, n) / (Math.pow(1+r, n) - 1);
}

document.getElementById('calcBtn').addEventListener('click', () => {
  const P = parseFloat(document.getElementById('principal').value);
  const rate = parseFloat(document.getElementById('rate').value);
  const n = parseInt(document.getElementById('months').value);
  if (!P || !n && n!==0) return;
  const emi = calcEmi(P, rate, n);
  const total = emi * n;
  const interest = total - P;
  const summary = document.getElementById('summary');
  summary.innerHTML = `<div class="alert alert-info">EMI: <strong>${emi.toFixed(2)}</strong> &nbsp; | &nbsp; Total Interest: <strong>${interest.toFixed(2)}</strong> &nbsp; | &nbsp; Total Payment: <strong>${total.toFixed(2)}</strong></div>`;
  document.getElementById('toggleSchedule').classList.remove('d-none');
});

document.getElementById('toggleSchedule').addEventListener('click', () => {
  const P = parseFloat(document.getElementById('principal').value);
  const rate = parseFloat(document.getElementById('rate').value);
  const n = parseInt(document.getElementById('months').value);
  const r = rate/12/100; const emi = calcEmi(P, rate, n);
  let bal = P; const rows = [];
  for (let m=1;m<=n;m++){
    const interest = bal * r;
    const principal = emi - interest;
    bal = Math.max(0, bal - principal);
    rows.push(`<tr><td>${m}</td><td>${emi.toFixed(2)}</td><td>${principal.toFixed(2)}</td><td>${interest.toFixed(2)}</td><td>${bal.toFixed(2)}</td></tr>`);
  }
  const table = `<table class="table table-sm table-striped"><thead><tr><th>Month</th><th>EMI</th><th>Principal</th><th>Interest</th><th>Balance</th></tr></thead><tbody>${rows.join('')}</tbody></table>`;
  const schedule = document.getElementById('schedule');
  schedule.innerHTML = table;
  schedule.classList.toggle('d-none');
});
</script>
</body>
</html>
