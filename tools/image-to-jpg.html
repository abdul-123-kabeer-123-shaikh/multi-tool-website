<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Image to JPG Converter</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="/assets/css/styles.css" rel="stylesheet">
</head>
<body>
<div id="header"></div>
<main class="container my-4">
  <h1 class="h3 mb-3">Image to JPG Converter</h1>
  <div class="ad-slot mb-3"><div class="ad-placeholder">Ad</div></div>
  <div class="tool-container">
    <div class="row g-3">
      <div class="col-12 col-md-8">
        <input id="fileInput" class="form-control" type="file" accept="image/*">
      </div>
      <div class="col-12 col-md-4">
        <label class="form-label">Quality: <span id="qVal">0.8</span></label>
        <input id="quality" type="range" class="form-range" min="0.1" max="1" step="0.05" value="0.8">
      </div>
    </div>
    <canvas id="canvas" class="w-100 d-none mt-3" style="max-height:60vh;"></canvas>
    <div id="actions" class="mt-3 d-none">
      <a id="downloadBtn" class="btn btn-primary" download="converted.jpg">Download JPG</a>
    </div>
  </div>
</main>
<div id="footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/assets/js/main.js"></script>
<script>
const fileInput = document.getElementById('fileInput');
const qualityInput = document.getElementById('quality');
const qVal = document.getElementById('qVal');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const downloadBtn = document.getElementById('downloadBtn');
const actions = document.getElementById('actions');
let currentImg = null;

qualityInput.addEventListener('input', () => {
  qVal.textContent = qualityInput.value;
  if (currentImg) render();
});

fileInput.addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = () => {
    currentImg = img;
    render();
    URL.revokeObjectURL(url);
  };
  img.src = url;
});

function render() {
  canvas.width = currentImg.width; canvas.height = currentImg.height;
  ctx.drawImage(currentImg, 0, 0);
  const dataURL = canvas.toDataURL('image/jpeg', parseFloat(qualityInput.value));
  downloadBtn.href = dataURL;
  canvas.classList.remove('d-none');
  actions.classList.remove('d-none');
}
</script>
</body>
</html>
