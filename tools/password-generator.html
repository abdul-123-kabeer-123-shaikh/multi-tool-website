<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Password Generator</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="/assets/css/styles.css" rel="stylesheet">
</head>
<body>
<div id="header"></div>
<main class="container my-4">
  <h1 class="h3 mb-3">Password Generator</h1>
  <div class="ad-slot mb-3"><div class="ad-placeholder">Ad</div></div>
  <div class="tool-container">
    <div class="row g-3 align-items-end">
      <div class="col-6 col-md-2"><label class="form-label">Length</label><input id="length" class="form-control" type="number" value="16" min="4" max="128"></div>
      <div class="col-6 col-md-2"><div class="form-check mt-4"><input id="upper" class="form-check-input" type="checkbox" checked><label class="form-check-label" for="upper">A-Z</label></div></div>
      <div class="col-6 col-md-2"><div class="form-check mt-4"><input id="lower" class="form-check-input" type="checkbox" checked><label class="form-check-label" for="lower">a-z</label></div></div>
      <div class="col-6 col-md-2"><div class="form-check mt-4"><input id="digits" class="form-check-input" type="checkbox" checked><label class="form-check-label" for="digits">0-9</label></div></div>
      <div class="col-6 col-md-2"><div class="form-check mt-4"><input id="symbols" class="form-check-input" type="checkbox"><label class="form-check-label" for="symbols">Symbols</label></div></div>
      <div class="col-6 col-md-2"><div class="form-check mt-4"><input id="ambiguous" class="form-check-input" type="checkbox"><label class="form-check-label" for="ambiguous">No ambiguous</label></div></div>
    </div>
    <div class="row g-3 mt-2 align-items-end">
      <div class="col-12 col-md-6">
        <input id="output" class="form-control form-control-lg" type="text" readonly>
      </div>
      <div class="col-6 col-md-3">
        <button id="genBtn" class="btn btn-primary w-100">Generate</button>
      </div>
      <div class="col-6 col-md-3">
        <button id="copyBtn" class="btn btn-outline-secondary w-100">Copy</button>
      </div>
    </div>
  </div>
</main>
<div id="footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/assets/js/main.js"></script>
<script>
function generate(){
  const length = Math.min(128, Math.max(4, parseInt(document.getElementById('length').value)||16));
  const sets = [];
  const upper = 'ABCDEFGHJKLMNPQRSTUVWXYZ'; // exclude I,O by default as ambiguous
  const lower = 'abcdefghijkmnopqrstuvwxyz'; // exclude l
  const digits = '23456789'; // exclude 0,1
  const symbolsAll = '!@#$%^&*()_+{}[]|:;<>,.?/~-=';
  const includeUpper = document.getElementById('upper').checked;
  const includeLower = document.getElementById('lower').checked;
  const includeDigits = document.getElementById('digits').checked;
  const includeSymbols = document.getElementById('symbols').checked;
  const noAmb = document.getElementById('ambiguous').checked;
  if (includeUpper) sets.push(noAmb ? upper : 'ABCDEFGHIJKLMNOPQRSTUVWXYZ');
  if (includeLower) sets.push(noAmb ? lower : 'abcdefghijklmnopqrstuvwxyz');
  if (includeDigits) sets.push(noAmb ? digits : '0123456789');
  if (includeSymbols) sets.push(symbolsAll);
  if (!sets.length) { document.getElementById('output').value = ''; return; }
  const all = sets.join('');
  const arr = new Uint32Array(length);
  if (window.crypto?.getRandomValues) window.crypto.getRandomValues(arr); else for (let i=0;i<length;i++) arr[i]=Math.random()*2**32;
  let pwd = '';
  for (let i=0;i<length;i++) pwd += all[arr[i] % all.length];
  // ensure at least one from each selected set
  const positions = [...Array(sets.length).keys()].map((_,i)=>i).sort(()=>Math.random()-0.5).slice(0, sets.length);
  for (let i=0;i<sets.length;i++) {
    const pos = positions[i] % length; const s = sets[i];
    pwd = pwd.substring(0,pos) + s[arr[i] % s.length] + pwd.substring(pos+1);
  }
  document.getElementById('output').value = pwd;
}

document.getElementById('genBtn').addEventListener('click', generate);
document.getElementById('copyBtn').addEventListener('click', ()=>{
  const el = document.getElementById('output'); el.select(); document.execCommand('copy');
});

generate();
</script>
</body>
</html>
