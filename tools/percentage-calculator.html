<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Percentage Calculator</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="/assets/css/styles.css" rel="stylesheet">
</head>
<body>
<div id="header"></div>
<main class="container my-4">
  <h1 class="h3 mb-3">Percentage Calculator</h1>
  <div class="ad-slot mb-3"><div class="ad-placeholder">Ad</div></div>
  <div class="tool-container">
    <div class="row g-3 align-items-end">
      <div class="col-12 col-md-4">
        <label class="form-label">Mode</label>
        <select id="mode" class="form-select">
          <option value="xOfY">What is X% of Y?</option>
          <option value="xIsWhatPercent">X is what % of Y?</option>
          <option value="increase">Increase Y by X%</option>
          <option value="decrease">Decrease Y by X%</option>
          <option value="change">% change from A to B</option>
        </select>
      </div>
      <div class="col-12 col-md-4">
        <label class="form-label" id="labelA">X</label>
        <input id="a" class="form-control" type="number" step="any" placeholder="Value or %">
      </div>
      <div class="col-12 col-md-4">
        <label class="form-label" id="labelB">Y</label>
        <input id="b" class="form-control" type="number" step="any" placeholder="Base value">
      </div>
    </div>
    <div class="mt-3">
      <button id="calcBtn" class="btn btn-primary">Calculate</button>
    </div>
    <div class="mt-3">
      <div class="alert alert-info d-none" id="result"></div>
    </div>
  </div>
</main>
<div id="footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/assets/js/main.js"></script>
<script>
const mode = document.getElementById('mode');
const a = document.getElementById('a');
const b = document.getElementById('b');
const labelA = document.getElementById('labelA');
const labelB = document.getElementById('labelB');
const result = document.getElementById('result');

function updateLabels(){
  switch(mode.value){
    case 'xOfY': labelA.textContent='X (%)'; labelB.textContent='Y'; break;
    case 'xIsWhatPercent': labelA.textContent='X'; labelB.textContent='Y'; break;
    case 'increase': labelA.textContent='X (%)'; labelB.textContent='Y'; break;
    case 'decrease': labelA.textContent='X (%)'; labelB.textContent='Y'; break;
    case 'change': labelA.textContent='A (from)'; labelB.textContent='B (to)'; break;
  }
}
mode.addEventListener('change', updateLabels); updateLabels();

document.getElementById('calcBtn').addEventListener('click', () => {
  const av = parseFloat(a.value); const bv = parseFloat(b.value);
  let text='';
  if (mode.value==='xOfY') {
    text = `${av}% of ${bv} = ${(bv * av/100).toFixed(4)}`;
  } else if (mode.value==='xIsWhatPercent') {
    text = `${av} is ${(av/bv*100).toFixed(4)}% of ${bv}`;
  } else if (mode.value==='increase') {
    text = `${bv} increased by ${av}% = ${(bv * (1+av/100)).toFixed(4)}`;
  } else if (mode.value==='decrease') {
    text = `${bv} decreased by ${av}% = ${(bv * (1-av/100)).toFixed(4)}`;
  } else if (mode.value==='change') {
    text = `Change from ${a.value} to ${b.value} = ${(((bv-av)/av)*100).toFixed(4)}%`;
  }
  result.textContent = text; result.classList.remove('d-none');
});
</script>
</body>
</html>
