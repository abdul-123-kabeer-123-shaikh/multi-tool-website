<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Word Counter</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="/assets/css/styles.css" rel="stylesheet">
</head>
<body>
<div id="header"></div>
<main class="container my-4">
  <h1 class="h3 mb-3">Word Counter</h1>
  <div class="ad-slot mb-3"><div class="ad-placeholder">Ad</div></div>
  <div class="tool-container">
    <textarea id="input" class="form-control" rows="8" placeholder="Type or paste your text here..."></textarea>
    <div class="row g-3 mt-3 small text-muted">
      <div class="col-6 col-md-3">Words: <span id="words">0</span></div>
      <div class="col-6 col-md-3">Characters: <span id="chars">0</span></div>
      <div class="col-6 col-md-3">Sentences: <span id="sentences">0</span></div>
      <div class="col-6 col-md-3">Paragraphs: <span id="paragraphs">0</span></div>
      <div class="col-6 col-md-3">Reading time: <span id="reading">0s</span></div>
    </div>
  </div>
</main>
<div id="footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/assets/js/main.js"></script>
<script>
const input = document.getElementById('input');
const wordsEl = document.getElementById('words');
const charsEl = document.getElementById('chars');
const sentencesEl = document.getElementById('sentences');
const paragraphsEl = document.getElementById('paragraphs');
const readingEl = document.getElementById('reading');

function update() {
  const text = input.value || '';
  const words = (text.trim().match(/\b\w+\b/g) || []).length;
  const chars = text.length;
  const sentences = (text.match(/[.!?]+(?=\s|$)/g) || []).length;
  const paragraphs = (text.trim().split(/\n{2,}/).filter(Boolean)).length || (text.trim() ? 1 : 0);
  const wpm = 200; const seconds = Math.round((words / wpm) * 60);
  wordsEl.textContent = words;
  charsEl.textContent = chars;
  sentencesEl.textContent = sentences;
  paragraphsEl.textContent = paragraphs;
  readingEl.textContent = seconds < 60 ? seconds + 's' : (Math.round(seconds/60) + 'm');
}
input.addEventListener('input', update);
update();
</script>
</body>
</html>
