<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Case Converter</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="/assets/css/styles.css" rel="stylesheet">
</head>
<body>
<div id="header"></div>
<main class="container my-4">
  <h1 class="h3 mb-3">Case Converter</h1>
  <div class="ad-slot mb-3"><div class="ad-placeholder">Ad</div></div>
  <div class="tool-container">
    <textarea id="input" class="form-control" rows="8" placeholder="Type or paste your text here..."></textarea>
    <div class="row g-2 mt-3">
      <div class="col-6 col-md-3"><button class="btn btn-outline-secondary w-100" data-action="upper">UPPERCASE</button></div>
      <div class="col-6 col-md-3"><button class="btn btn-outline-secondary w-100" data-action="lower">lowercase</button></div>
      <div class="col-6 col-md-3"><button class="btn btn-outline-secondary w-100" data-action="title">Title Case</button></div>
      <div class="col-6 col-md-3"><button class="btn btn-outline-secondary w-100" data-action="sentence">Sentence case</button></div>
      <div class="col-6 col-md-3"><button class="btn btn-outline-secondary w-100" data-action="alternate">aLtErNaTiNg</button></div>
      <div class="col-6 col-md-3"><button class="btn btn-outline-secondary w-100" data-action="capitalize">Capitalize Each Word</button></div>
      <div class="col-6 col-md-3"><button class="btn btn-outline-secondary w-100" data-action="snake">snake_case</button></div>
      <div class="col-6 col-md-3"><button class="btn btn-outline-secondary w-100" data-action="kebab">kebab-case</button></div>
      <div class="col-6 col-md-3"><button class="btn btn-outline-secondary w-100" data-action="camel">camelCase</button></div>
      <div class="col-6 col-md-3"><button class="btn btn-outline-secondary w-100" data-action="pascal">PascalCase</button></div>
    </div>
  </div>
</main>
<div id="footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/assets/js/main.js"></script>
<script>
const input = document.getElementById('input');

document.querySelectorAll('[data-action]').forEach(btn => {
  btn.addEventListener('click', () => {
    const action = btn.dataset.action;
    const text = input.value;
    input.value = transform(text, action);
  });
});

function titleCase(str){
  return str.toLowerCase().replace(/\b\w+/g, w => w[0].toUpperCase() + w.slice(1));
}
function sentenceCase(str){
  return str.toLowerCase().replace(/(^\s*\w|[.!?]\s*\w)/g, c => c.toUpperCase());
}
function alternateCase(str){
  let out = ''; let up = true;
  for (const ch of str) {
    if (/\s/.test(ch)) { out += ch; continue; }
    out += up ? ch.toUpperCase() : ch.toLowerCase();
    up = !up;
  } return out;
}
function toSnake(str) {
  return str.trim().replace(/[^\w\s]/g,'').replace(/\s+/g,' ').split(' ').filter(Boolean).join('_').toLowerCase();
}
function toKebab(str){
  return toSnake(str).replace(/_/g,'-');
}
function transform(t, mode){
  switch(mode){
    case 'upper': return t.toUpperCase();
    case 'lower': return t.toLowerCase();
    case 'title': return titleCase(t);
    case 'sentence': return sentenceCase(t);
    case 'alternate': return alternateCase(t);
    case 'capitalize': return t.replace(/\b\w/g, c => c.toUpperCase());
    case 'snake': return toSnake(t);
    case 'kebab': return toKebab(t);
    case 'camel': return toCamel(t);
    case 'pascal': return toPascal(t);
    default: return t;
  }
}
function toCamel(str){ const s = toKebab(str).split('-'); return s[0] + s.slice(1).map(w=>w[0]?.toUpperCase()+w.slice(1)).join(''); }
function toPascal(str){ const s = toKebab(str).split('-'); return s.map(w=>w[0]?.toUpperCase()+w.slice(1)).join('');
}
</script>
</body>
</html>
