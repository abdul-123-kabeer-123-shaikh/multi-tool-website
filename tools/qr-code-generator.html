<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>QR Code Generator</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="/assets/css/styles.css" rel="stylesheet">
</head>
<body>
<div id="header"></div>
<main class="container my-4">
  <h1 class="h3 mb-3">QR Code Generator</h1>
  <div class="ad-slot mb-3"><div class="ad-placeholder">Ad</div></div>
  <div class="tool-container">
    <div class="row g-3 align-items-end">
      <div class="col-12 col-md-8">
        <label class="form-label">Text or URL</label>
        <input id="text" class="form-control" type="text" placeholder="Enter text or URL">
      </div>
      <div class="col-6 col-md-2">
        <label class="form-label">Size</label>
        <input id="size" class="form-control" type="number" value="256" min="64" max="1024">
      </div>
      <div class="col-6 col-md-2">
        <label class="form-label">Margin</label>
        <input id="margin" class="form-control" type="number" value="1" min="0" max="10">
      </div>
      <div class="col-6 col-md-2">
        <label class="form-label">Color</label>
        <input id="color" class="form-control" type="color" value="#000000">
      </div>
      <div class="col-6 col-md-2">
        <button id="genBtn" class="btn btn-primary w-100">Generate</button>
      </div>
    </div>
    <div class="text-center mt-3">
      <canvas id="canvas"></canvas>
      <div class="mt-2">
        <a id="download" class="btn btn-success d-none" download="qrcode.png">Download</a>
      </div>
    </div>
  </div>
</main>
<div id="footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/assets/js/main.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script>
const canvas = document.getElementById('canvas');
const dl = document.getElementById('download');
document.getElementById('genBtn').addEventListener('click', async () => {
  const text = document.getElementById('text').value || '';
  const size = parseInt(document.getElementById('size').value) || 256;
  const margin = parseInt(document.getElementById('margin').value) || 1;
  const color = document.getElementById('color').value || '#000000';
  if (!text) return;
  canvas.width = size; canvas.height = size;
  await QRCode.toCanvas(canvas, text, { width: size, margin, color: { dark: color, light: '#ffffff' } });
  dl.href = canvas.toDataURL('image/png');
  dl.classList.remove('d-none');
});
</script>
</body>
</html>
