<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Fancy Text Generator</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="/assets/css/styles.css" rel="stylesheet">
</head>
<body>
<div id="header"></div>
<main class="container my-4">
  <h1 class="h3 mb-3">Fancy Text Generator</h1>
  <div class="ad-slot mb-3"><div class="ad-placeholder">Ad</div></div>
  <div class="tool-container">
    <textarea id="input" class="form-control" rows="3" placeholder="Enter your text..."></textarea>
    <div class="row g-3 mt-2">
      <div class="col-6 col-md-3"><button class="btn btn-outline-secondary w-100" data-style="bold">Bold</button></div>
      <div class="col-6 col-md-3"><button class="btn btn-outline-secondary w-100" data-style="italic">Italic</button></div>
      <div class="col-6 col-md-3"><button class="btn btn-outline-secondary w-100" data-style="script">Script</button></div>
      <div class="col-6 col-md-3"><button class="btn btn-outline-secondary w-100" data-style="fraktur">Fraktur</button></div>
      <div class="col-6 col-md-3"><button class="btn btn-outline-secondary w-100" data-style="double">Double-struck</button></div>
      <div class="col-6 col-md-3"><button class="btn btn-outline-secondary w-100" data-style="mono">Monospace</button></div>
      <div class="col-6 col-md-3"><button class="btn btn-outline-secondary w-100" data-style="bubble">Bubble</button></div>
      <div class="col-6 col-md-3"><button class="btn btn-outline-secondary w-100" data-style="square">Square</button></div>
    </div>
    <div class="mt-3" id="outputs"></div>
  </div>
</main>
<div id="footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/assets/js/main.js"></script>
<script>
const input = document.getElementById('input');
const outputs = document.getElementById('outputs');
const base = 'abcdefghijklmnopqrstuvwxyz';
const styles = {
  bold: ['ЁЭРЪ','ЁЭРЫ','ЁЭРЬ','ЁЭРЭ','ЁЭРЮ','ЁЭРЯ','ЁЭРа','ЁЭРб','ЁЭРв','ЁЭРг','ЁЭРд','ЁЭРе','ЁЭРж','ЁЭРз','ЁЭРи','ЁЭРй','ЁЭРк','ЁЭРл','ЁЭРм','ЁЭРн','ЁЭРо','ЁЭРп','ЁЭР░','ЁЭР▒','ЁЭР▓','ЁЭР│'],
  italic: ['ЁЭСО','ЁЭСП','ЁЭСР','ЁЭСС','ЁЭСТ','ЁЭСУ','ЁЭСФ','тДО','ЁЭСЦ','ЁЭСЧ','ЁЭСШ','ЁЭСЩ','ЁЭСЪ','ЁЭСЫ','ЁЭСЬ','ЁЭСЭ','ЁЭСЮ','ЁЭСЯ','ЁЭСа','ЁЭСб','ЁЭСв','ЁЭСг','ЁЭСд','ЁЭСе','ЁЭСж','ЁЭСз'],
  script: ['ЁЭТ╢','ЁЭТ╖','ЁЭТ╕','ЁЭТ╣','ЁЭСТ','ЁЭТ╗','тДК','ЁЭТ╜','ЁЭТ╛','ЁЭТ┐','ЁЭУА','ЁЭУБ','ЁЭУВ','ЁЭУГ','ЁЭСЬ','ЁЭУЕ','ЁЭУЖ','ЁЭУЗ','ЁЭУИ','ЁЭУЙ','ЁЭУК','ЁЭУЛ','ЁЭУМ','ЁЭУН','ЁЭУО','ЁЭУП'],
  fraktur: ['ЁЭФЮ','ЁЭФЯ','ЁЭФа','ЁЭФб','ЁЭФв','ЁЭФг','ЁЭФд','ЁЭФе','ЁЭФж','ЁЭФз','ЁЭФи','ЁЭФй','ЁЭФк','ЁЭФл','ЁЭФм','ЁЭФн','ЁЭФо','ЁЭФп','ЁЭФ░','ЁЭФ▒','ЁЭФ▓','ЁЭФ│','ЁЭФ┤','ЁЭФ╡','ЁЭФ╢','ЁЭФ╖'],
  double: ['ЁЭХТ','ЁЭХУ','ЁЭХФ','ЁЭХХ','ЁЭХЦ','ЁЭХЧ','ЁЭХШ','ЁЭХЩ','ЁЭХЪ','ЁЭХЫ','ЁЭХЬ','ЁЭХЭ','ЁЭХЮ','ЁЭХЯ','ЁЭХа','ЁЭХб','ЁЭХв','ЁЭХг','ЁЭХд','ЁЭХе','ЁЭХж','ЁЭХз','ЁЭХи','ЁЭХй','ЁЭХк','ЁЭХл'],
  mono: ['ЁЭЪК','ЁЭЪЛ','ЁЭЪМ','ЁЭЪН','ЁЭЪО','ЁЭЪП','ЁЭЪР','ЁЭЪС','ЁЭЪТ','ЁЭЪУ','ЁЭЪФ','ЁЭЪХ','ЁЭЪЦ','ЁЭЪЧ','ЁЭЪШ','ЁЭЪЩ','ЁЭЪЪ','ЁЭЪЫ','ЁЭЪЬ','ЁЭЪЭ','ЁЭЪЮ','ЁЭЪЯ','ЁЭЪа','ЁЭЪб','ЁЭЪв','ЁЭЪг'],
  bubble: ['тУР','тУС','тУТ','тУУ','тУФ','тУХ','тУЦ','тУЧ','тУШ','тУЩ','тУЪ','тУЫ','тУЬ','тУЭ','тУЮ','тУЯ','тУа','тУб','тУв','тУг','тУд','тУе','тУж','тУз','тУи','тУй'],
  square: ['ЁЯД░','ЁЯД▒','ЁЯД▓','ЁЯД│','ЁЯД┤','ЁЯД╡','ЁЯД╢','ЁЯД╖','ЁЯД╕','ЁЯД╣','ЁЯД║','ЁЯД╗','ЁЯД╝','ЁЯД╜','ЁЯД╛','ЁЯД┐','ЁЯЕА','ЁЯЕБ','ЁЯЕВ','ЁЯЕГ','ЁЯЕД','ЁЯЕЕ','ЁЯЕЖ','ЁЯЕЗ','ЁЯЕИ','ЁЯЕЙ'].map(c=>c.toLowerCase())
};

function stylize(str, map){
  const upper = base.toUpperCase();
  const lower = base;
  let out = '';
  for (const ch of str) {
    const li = lower.indexOf(ch);
    const ui = upper.indexOf(ch);
    if (li !== -1) out += map[li];
    else if (ui !== -1) out += map[ui].toUpperCase();
    else out += ch;
  }
  return out;
}

function renderAll(){
  const text = input.value || '';
  outputs.innerHTML = '';
  Object.entries(styles).forEach(([name, map]) => {
    const val = stylize(text, map);
    const block = document.createElement('div');
    block.className = 'p-2 border rounded mb-2';
    block.innerHTML = `<div class="d-flex justify-content-between align-items-center"><strong class="text-capitalize">${name}</strong><button class="btn btn-sm btn-outline-secondary" data-copy>Copy</button></div><div class="mt-2">${val || '<span class="text-muted">(empty)</span>'}</div>`;
    block.querySelector('[data-copy]').addEventListener('click', ()=>{
      navigator.clipboard.writeText(val);
    });
    outputs.appendChild(block);
  });
}

input.addEventListener('input', renderAll);
renderAll();

document.querySelectorAll('[data-style]').forEach(btn => {
  btn.addEventListener('click', () => {
    const style = btn.dataset.style; const map = styles[style];
    if (map) navigator.clipboard.writeText(stylize(input.value, map));
  });
});
</script>
</body>
</html>
