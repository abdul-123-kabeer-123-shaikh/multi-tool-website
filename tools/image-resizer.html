<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Image Resizer</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="/assets/css/styles.css" rel="stylesheet">
</head>
<body>
<div id="header"></div>
<main class="container my-4">
  <h1 class="h3 mb-3">Image Resizer</h1>
  <div class="ad-slot mb-3"><div class="ad-placeholder">Ad</div></div>
  <div class="tool-container">
    <div class="row g-3 align-items-end">
      <div class="col-12 col-md-4">
        <label class="form-label">Choose Image</label>
        <input id="fileInput" class="form-control" type="file" accept="image/*">
      </div>
      <div class="col-6 col-md-2">
        <label class="form-label">Width (px)</label>
        <input id="width" class="form-control" type="number" min="1" placeholder="Auto">
      </div>
      <div class="col-6 col-md-2">
        <label class="form-label">Height (px)</label>
        <input id="height" class="form-control" type="number" min="1" placeholder="Auto">
      </div>
      <div class="col-12 col-md-2 form-check">
        <input id="lock" class="form-check-input" type="checkbox" checked>
        <label class="form-check-label" for="lock">Lock aspect ratio</label>
      </div>
      <div class="col-12 col-md-2">
        <button id="resizeBtn" class="btn btn-primary w-100" disabled>Resize</button>
      </div>
    </div>
    <canvas id="canvas" class="w-100 d-none mt-3" style="max-height:60vh;"></canvas>
    <div id="actions" class="mt-3 d-none">
      <a id="downloadBtn" class="btn btn-success" download="resized.png">Download</a>
    </div>
  </div>
</main>
<div id="footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/assets/js/main.js"></script>
<script>
let img = null;
const fileInput = document.getElementById('fileInput');
const widthInput = document.getElementById('width');
const heightInput = document.getElementById('height');
const lock = document.getElementById('lock');
const resizeBtn = document.getElementById('resizeBtn');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const downloadBtn = document.getElementById('downloadBtn');

fileInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const url = URL.createObjectURL(file);
  const image = new Image();
  image.onload = () => {
    img = image;
    widthInput.value = image.width;
    heightInput.value = image.height;
    resizeBtn.disabled = false;
    URL.revokeObjectURL(url);
  };
  image.src = url;
});

widthInput.addEventListener('input', () => {
  if (lock.checked && img && widthInput.value) {
    heightInput.value = Math.round((parseInt(widthInput.value) / img.width) * img.height);
  }
});
heightInput.addEventListener('input', () => {
  if (lock.checked && img && heightInput.value) {
    widthInput.value = Math.round((parseInt(heightInput.value) / img.height) * img.width);
  }
});

resizeBtn.addEventListener('click', () => {
  if (!img) return;
  const w = parseInt(widthInput.value) || img.width;
  const h = parseInt(heightInput.value) || img.height;
  canvas.width = w; canvas.height = h;
  ctx.imageSmoothingQuality = 'high';
  ctx.drawImage(img, 0, 0, w, h);
  canvas.classList.remove('d-none');
  document.getElementById('actions').classList.remove('d-none');
  downloadBtn.href = canvas.toDataURL('image/png');
});
</script>
</body>
</html>
