<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Meme Generator</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="/assets/css/styles.css" rel="stylesheet">
<style>
.meme-text { text-transform: uppercase; font-weight: 900; text-align: center; text-shadow: 2px 2px 0 #000, -2px 2px 0 #000, 2px -2px 0 #000, -2px -2px 0 #000; }
</style>
</head>
<body>
<div id="header"></div>
<main class="container my-4">
  <h1 class="h3 mb-3">Meme Generator</h1>
  <div class="ad-slot mb-3"><div class="ad-placeholder">Ad</div></div>
  <div class="tool-container">
    <div class="row g-3 align-items-end">
      <div class="col-12 col-md-4">
        <label class="form-label">Choose Image</label>
        <input id="fileInput" class="form-control" type="file" accept="image/*">
      </div>
      <div class="col-12 col-md-4">
        <label class="form-label">Top Text</label>
        <input id="topText" class="form-control" type="text" placeholder="TOP TEXT">
      </div>
      <div class="col-12 col-md-4">
        <label class="form-label">Bottom Text</label>
        <input id="bottomText" class="form-control" type="text" placeholder="BOTTOM TEXT">
      </div>
    </div>
    <div class="row g-3 mt-2 align-items-end">
      <div class="col-6 col-md-3">
        <label class="form-label">Font Size</label>
        <input id="fontSize" class="form-control" type="number" value="40" min="10" max="200">
      </div>
      <div class="col-6 col-md-3">
        <label class="form-label">Padding</label>
        <input id="padding" class="form-control" type="number" value="10" min="0" max="100">
      </div>
      <div class="col-12 col-md-3">
        <button id="renderBtn" class="btn btn-primary w-100" disabled>Render</button>
      </div>
      <div class="col-12 col-md-3">
        <a id="downloadBtn" class="btn btn-success w-100 d-none" download="meme.png">Download</a>
      </div>
    </div>
    <canvas id="canvas" class="w-100 d-none mt-3" style="max-height:70vh;"></canvas>
  </div>
</main>
<div id="footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/assets/js/main.js"></script>
<script>
let img = null;
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

document.getElementById('fileInput').addEventListener('change', e => {
  const file = e.target.files[0]; if (!file) return;
  const url = URL.createObjectURL(file);
  const image = new Image();
  image.onload = () => { img = image; document.getElementById('renderBtn').disabled = false; URL.revokeObjectURL(url); };
  image.src = url;
});

function drawText(text, y, fontSize, padding){
  ctx.font = `${fontSize}px Impact, Arial Black, sans-serif`;
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = '#000';
  ctx.lineWidth = Math.max(2, Math.round(fontSize/10));
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  const lines = wrapText(text.toUpperCase(), canvas.width - padding*2, fontSize);
  let dy = y;
  for (const line of lines){
    ctx.strokeText(line, canvas.width/2, dy);
    ctx.fillText(line, canvas.width/2, dy);
    dy += fontSize + 4;
  }
}

function wrapText(text, maxWidth, fontSize){
  const words = text.split(/\s+/);
  const lines = [];
  let line = '';
  for (const w of words){
    const test = line ? line + ' ' + w : w;
    const width = ctx.measureText(test).width;
    if (width > maxWidth && line) { lines.push(line); line = w; }
    else line = test;
  }
  if (line) lines.push(line);
  return lines;
}

document.getElementById('renderBtn').addEventListener('click', () => {
  if (!img) return;
  const top = document.getElementById('topText').value || '';
  const bottom = document.getElementById('bottomText').value || '';
  const fontSize = parseInt(document.getElementById('fontSize').value) || 40;
  const padding = parseInt(document.getElementById('padding').value) || 10;
  canvas.width = img.width; canvas.height = img.height;
  ctx.drawImage(img, 0, 0);
  drawText(top, padding, fontSize, padding);
  // estimate bottom y by counting lines
  ctx.font = `${fontSize}px Impact, Arial Black, sans-serif`;
  const bottomLines = wrapText((bottom||'').toUpperCase(), canvas.width - padding*2, fontSize).length;
  const totalHeight = bottomLines * (fontSize + 4);
  drawText(bottom, canvas.height - padding - totalHeight, fontSize, padding);
  canvas.classList.remove('d-none');
  const link = document.getElementById('downloadBtn');
  link.href = canvas.toDataURL('image/png');
  link.classList.remove('d-none');
});
</script>
</body>
</html>
