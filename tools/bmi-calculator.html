<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>BMI Calculator</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="/assets/css/styles.css" rel="stylesheet">
</head>
<body>
<div id="header"></div>
<main class="container my-4">
  <h1 class="h3 mb-3">BMI Calculator</h1>
  <div class="ad-slot mb-3"><div class="ad-placeholder">Ad</div></div>
  <div class="tool-container">
    <div class="row g-3 align-items-end">
      <div class="col-12 col-md-3">
        <label class="form-label">System</label>
        <select id="system" class="form-select">
          <option value="metric">Metric (kg, cm)</option>
          <option value="imperial">Imperial (lb, in)</option>
        </select>
      </div>
      <div class="col-6 col-md-3">
        <label class="form-label" id="wLabel">Weight (kg)</label>
        <input id="weight" class="form-control" type="number" step="any" min="1">
      </div>
      <div class="col-6 col-md-3">
        <label class="form-label" id="hLabel">Height (cm)</label>
        <input id="height" class="form-control" type="number" step="any" min="1">
      </div>
      <div class="col-12 col-md-3">
        <button id="calcBtn" class="btn btn-primary w-100">Calculate</button>
      </div>
    </div>
    <div class="mt-3">
      <div class="alert alert-info d-none" id="result"></div>
    </div>
  </div>
</main>
<div id="footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/assets/js/main.js"></script>
<script>
const system = document.getElementById('system');
const wLabel = document.getElementById('wLabel');
const hLabel = document.getElementById('hLabel');

system.addEventListener('change', () => {
  if (system.value==='metric'){ wLabel.textContent='Weight (kg)'; hLabel.textContent='Height (cm)'; }
  else { wLabel.textContent='Weight (lb)'; hLabel.textContent='Height (in)'; }
});

document.getElementById('calcBtn').addEventListener('click', () => {
  const w = parseFloat(document.getElementById('weight').value);
  const h = parseFloat(document.getElementById('height').value);
  if (!w || !h) return;
  let bmi;
  if (system.value==='metric') {
    bmi = w / Math.pow(h/100, 2);
  } else {
    bmi = 703 * w / Math.pow(h, 2);
  }
  let cat = 'Underweight';
  if (bmi >= 30) cat='Obese'; else if (bmi >= 25) cat='Overweight'; else if (bmi >= 18.5) cat='Normal';
  const el = document.getElementById('result');
  el.textContent = `BMI: ${bmi.toFixed(2)} (${cat})`;
  el.classList.remove('d-none');
});
</script>
</body>
</html>
