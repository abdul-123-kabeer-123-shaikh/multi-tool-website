<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Image Compressor</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="/assets/css/styles.css" rel="stylesheet">
</head>
<body>
<div id="header"></div>
<main class="container my-4">
  <h1 class="h3 mb-3">Image Compressor</h1>
  <div class="ad-slot mb-3"><div class="ad-placeholder">Ad</div></div>
  <div class="tool-container">
    <div class="row g-3 align-items-end">
      <div class="col-12 col-md-4">
        <label class="form-label">Choose Image</label>
        <input id="fileInput" class="form-control" type="file" accept="image/*">
      </div>
      <div class="col-12 col-md-4">
        <label class="form-label">Format</label>
        <select id="format" class="form-select">
          <option value="image/jpeg">JPEG</option>
          <option value="image/webp">WEBP</option>
        </select>
      </div>
      <div class="col-12 col-md-4">
        <label class="form-label">Quality: <span id="qVal">0.7</span></label>
        <input id="quality" type="range" class="form-range" min="0.05" max="1" step="0.05" value="0.7">
      </div>
    </div>
    <canvas id="canvas" class="w-100 d-none mt-3" style="max-height:60vh;"></canvas>
    <div id="actions" class="mt-3 d-none">
      <a id="downloadBtn" class="btn btn-success" download="compressed">Download</a>
    </div>
  </div>
</main>
<div id="footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/assets/js/main.js"></script>
<script>
let img = null; let fileName = 'image';
const fileInput = document.getElementById('fileInput');
const format = document.getElementById('format');
const quality = document.getElementById('quality');
const qVal = document.getElementById('qVal');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const downloadBtn = document.getElementById('downloadBtn');

function update() {
  if (!img) return;
  canvas.width = img.width; canvas.height = img.height;
  ctx.drawImage(img, 0, 0);
  const mime = format.value;
  const q = parseFloat(quality.value);
  const url = canvas.toDataURL(mime, q);
  const ext = mime.includes('webp') ? 'webp' : 'jpg';
  downloadBtn.download = (fileName.replace(/\.[^.]+$/, '')) + '-compressed.' + ext;
  downloadBtn.href = url;
  canvas.classList.remove('d-none');
  document.getElementById('actions').classList.remove('d-none');
}

fileInput.addEventListener('change', e => {
  const file = e.target.files[0]; if (!file) return;
  fileName = file.name || 'image';
  const url = URL.createObjectURL(file);
  const image = new Image();
  image.onload = () => { img = image; update(); URL.revokeObjectURL(url); };
  image.src = url;
});
format.addEventListener('change', update);
quality.addEventListener('input', () => { qVal.textContent = quality.value; update(); });
</script>
</body>
</html>
