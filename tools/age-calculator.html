<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Age Calculator</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="/assets/css/styles.css" rel="stylesheet">
</head>
<body>
<div id="header"></div>
<main class="container my-4">
  <h1 class="h3 mb-3">Age Calculator</h1>
  <div class="ad-slot mb-3"><div class="ad-placeholder">Ad</div></div>
  <div class="tool-container">
    <div class="row g-3 align-items-end">
      <div class="col-12 col-md-6">
        <label class="form-label">Date of Birth</label>
        <input id="dob" class="form-control" type="date">
      </div>
      <div class="col-12 col-md-6">
        <label class="form-label">As of date (optional)</label>
        <input id="asof" class="form-control" type="date">
      </div>
    </div>
    <div class="mt-3"><button id="calcBtn" class="btn btn-primary">Calculate</button></div>
    <div class="mt-3">
      <div class="alert alert-info d-none" id="result"></div>
    </div>
  </div>
</main>
<div id="footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/assets/js/main.js"></script>
<script>
function diffYMD(from, to){
  let years = to.getFullYear() - from.getFullYear();
  let months = to.getMonth() - from.getMonth();
  let days = to.getDate() - from.getDate();
  if (days < 0) {
    months -= 1;
    const prevMonth = new Date(to.getFullYear(), to.getMonth(), 0).getDate();
    days += prevMonth;
  }
  if (months < 0) { months += 12; years -= 1; }
  return {years, months, days};
}

document.getElementById('calcBtn').addEventListener('click', () => {
  const dob = document.getElementById('dob').value;
  if (!dob) return;
  const asofVal = document.getElementById('asof').value;
  const from = new Date(dob);
  const to = asofVal ? new Date(asofVal) : new Date();
  if (to < from) return;
  const {years, months, days} = diffYMD(from, to);
  const totalDays = Math.floor((to - from)/(1000*60*60*24));
  const text = `Age: ${years} years, ${months} months, ${days} days (≈ ${totalDays} days)`;
  const el = document.getElementById('result'); el.textContent = text; el.classList.remove('d-none');
});
</script>
</body>
</html>
